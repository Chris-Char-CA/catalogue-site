<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunglasses 01 – Product View</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#650c32;
    font-family:Arial,sans-serif;
    color:white;
}

/* FULL WIDTH HEADER */
.header{
    width:100%;
    margin:0;
    padding:0;
}

.header img{
    width:100%;
    height:auto;
    display:block;
    object-fit:cover;
}

/* Wrapper */
.wrapper{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

/* Back Button */
.back{
    margin-top:10px;
}

.back a{
    color:white;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

/* Slider */
.viewer-container{
    position:relative;
    width:100%;
    height:75vh;
    overflow:hidden;
    border-radius:14px;
    background:#7a1743;
    margin-top:20px;
}

/* Image Track */
.viewer{
    display:flex;
    width:100%;
    height:100%;
    transition:transform 0.4s ease;
}

/* Images */
.viewer img{
    min-width:100%;
    height:100%;
    object-fit:contain;
    image-rendering:auto;
    background:#7a1743;
}

/* Arrows */
.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,255,255,0.18);
    border:none;
    color:white;
    font-size:40px;
    padding:10px 16px;
    cursor:pointer;
    border-radius:50%;
    backdrop-filter:blur(4px);
    transition:0.2s;
    z-index:10;
}

.arrow:hover{
    background:rgba(255,255,255,0.35);
}

.arrow.left{
    left:15px;
}

.arrow.right{
    right:15px;
}
</style>

<script>
let currentIndex = 0;

function updateSlider() {
    const viewer = document.getElementById('viewer');
    viewer.style.transform = `translateX(-${currentIndex * 100}%)`;
}

function nextImage() {
    const total = document.querySelectorAll('.viewer img').length;
    currentIndex = (currentIndex + 1) % total;
    updateSlider();
}

function prevImage() {
    const total = document.querySelectorAll('.viewer img').length;
    currentIndex = (currentIndex - 1 + total) % total;
    updateSlider();
}
</script>

</head>

<body>

<!-- FULL WIDTH HEADER -->
<div class="header">
    <img src="https://i.postimg.cc/sD1pmPzC/IMG-6054.png" alt="Header Banner">
</div>

<div class="wrapper">

    <!-- Back Button -->
    <div class="back">
        <a href="../sunglasses.html">← Back</a>
    </div>

    <!-- Image Slider -->
    <div class="viewer-container">

        <button class="arrow left" onclick="prevImage()">❮</button>

        <div class="viewer" id="viewer">

            <img src="https://i.postimg.cc/V6sG4S4S/1.jpg" loading="lazy">

            <img src="https://i.postimg.cc/XqHT9KbN/2.jpg" loading="lazy">

            <img src="https://i.postimg.cc/JnRggYrq/3.jpg" loading="lazy">

            <img src="https://i.postimg.cc/tTDfHd7Y/4.jpg" loading="lazy">

            <img src="https://i.postimg.cc/Bb6zZ81D/5.jpg" loading="lazy">

            <img src="https://i.postimg.cc/QCtzNBTG/6.jpg" loading="lazy">

        </div>

        <button class="arrow right" onclick="nextImage()">❯</button>

    </div>

</div>

</body>
