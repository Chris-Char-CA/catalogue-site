<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunglasses 01 – Product View</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#ffffff;
    font-family:Arial,sans-serif;
}

.wrapper{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* زر الرجوع */
.back a{
    color:#333;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

/* السلايدر */
.viewer-container{
    position:relative;
    width:100%;
    height:70vh;
    overflow:hidden;
    border-radius:12px;
    background:#f2f2f2;
    margin-top:20px;
}

.viewer{
    display:flex;
    width:100%;
    height:100%;
    transition:transform 0.4s ease;
}

.viewer img{
    min-width:100%;
    height:100%;
    object-fit:contain;
}

/* الأسهم */
.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,255,255,0.2);
    border:none;
    color:white;
    font-size:40px;
    padding:10px 15px;
    cursor:pointer;
    border-radius:50%;
    backdrop-filter:blur(4px);
    transition:0.2s;
    z-index:10;
}

.arrow:hover{
    background:rgba(255,255,255,0.4);
}

.arrow.left{
    left:15px;
}

.arrow.right{
    right:15px;
}
</style>

<script>
let currentIndex = 0;

function updateSlider() {
    const viewer = document.getElementById('viewer');
    viewer.style.transform = `translateX(-${currentIndex * 100}%)`;
}

function nextImage() {
    const total = document.querySelectorAll('.viewer img').length;
    currentIndex = (currentIndex + 1) % total;
    updateSlider();
}

function prevImage() {
    const total = document.querySelectorAll('.viewer img').length;
    currentIndex = (currentIndex - 1 + total) % total;
    updateSlider();
}
</script>

</head>

<body>

<div class="wrapper">

    <!-- زر الرجوع -->
    <div class="back">
        <a href="../sunglasses.html">← Back</a>
    </div>

    <!-- الصور -->
    <div class="viewer-container">

        <button class="arrow left" onclick="prevImage()">❮</button>

        <div class="viewer" id="viewer">
            <img src="sunglasses_01/full/1.jpeg">
            <img src="sunglasses_01/full/2.jpeg">
            <img src="sunglasses_01/full/3.jpeg">
            <img src="sunglasses_01/full/4.jpeg">
            <img src="sunglasses_01/full/5.jpeg">
            <img src="sunglasses_01/full/6.jpeg">
        </div>

        <button class="arrow right" onclick="nextImage()">❯</button>

    </div>

</div>

</body>
</html>
