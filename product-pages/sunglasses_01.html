<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunglasses 01 – Product View</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#ffffff;
    font-family:Arial,sans-serif;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* Back Button */
.back a{
    color:#333;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

/* Slider Container */
.viewer-container{
    position:relative;
    width:100%;
    height:auto;
    overflow:hidden;
    border-radius:12px;
    background:#f5f5f5;
    margin-top:20px;
}

/* Slider */
.viewer{
    display:flex;
    transition:transform 0.4s ease;
}

/* Images */
.viewer img{
    width:100%;
    max-height:90vh;
    object-fit:contain;
    flex-shrink:0;
    background:white;

    /* SHARPNESS FIX */
    image-rendering:-webkit-optimize-contrast;
    image-rendering:high-quality;
    image-rendering:crisp-edges;
}

/* Arrows */
.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.25);
    border:none;
    color:white;
    font-size:36px;
    padding:12px 18px;
    cursor:pointer;
    border-radius:50%;
    z-index:10;
    transition:0.2s;
}

.arrow:hover{
    background:rgba(0,0,0,0.5);
}

.arrow.left{
    left:15px;
}

.arrow.right{
    right:15px;
}
</style>

<script>
let currentIndex = 0;

function updateSlider() {
    const viewer = document.getElementById('viewer');
    viewer.style.transform = `translateX(-${currentIndex * 100}%)`;
}

function nextImage() {
    const total = document.querySelectorAll('.viewer img').length;
    currentIndex = (currentIndex + 1) % total;
    updateSlider();
}

function prevImage() {
    const total = document.querySelectorAll('.viewer img').length;
    currentIndex = (currentIndex - 1 + total) % total;
    updateSlider();
}
</script>

</head>

<body>

<div class="wrapper">

    <!-- Back Button -->
    <div class="back">
        <a href="../sunglasses.html">← Back</a>
    </div>

    <!-- Image Slider -->
    <div class="viewer-container">

        <button class="arrow left" onclick="prevImage()">❮</button>

        <div class="viewer" id="viewer">

            <img src="https://i.postimg.cc/rwbZjY47/1.jpg">

            <img src="https://i.postimg.cc/wBmfGccm/2.jpg">

            <img src="https://i.postimg.cc/fb92rjjX/3.jpg">

            <img src="https://i.postimg.cc/pdFG6YYB/4.jpg">

            <img src="https://i.postimg.cc/0NwWBddK/5.jpg">

            <img src="https://i.postimg.cc/C1pPTBmc/6.jpg">

        </div>

        <button class="arrow right" onclick="nextImage()">❯</button>

    </div>

</div>

</body>
</html>
