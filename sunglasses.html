<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sunglasses</title>

    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #650c32;
            margin: 0;
            color: white;
        }

        .header {
            width: 100%;
        }

        .header img {
            width: 100%;
            display: block;
        }

        h1 { 
            text-align: center; 
            padding: 25px 0 15px;
            font-size: 42px;
            margin: 0;
        }

        .back-link {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 35px;
            padding: 20px 30px 40px;
        }

        .item {
            text-align: center;
        }

        .item img {
            width: 85%;
            height: 290px;
            object-fit: cover;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
        }

        .price {
            font-size: 22px;
            font-weight: bold;
            margin-top: 12px;
        }

        /* Default AVAILABLE color */
        .availability {
            font-size: 25px;
            font-weight: bold;
            color: #fed57e;
            margin-top: 6px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .item img {
                width: 90%;
                height: 260px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="https://i.postimg.cc/sD1pmPzC/IMG-6054.png" alt="Header Banner">
    </div>

    <h1>Sunglasses</h1>

    <div class="back-link">
        <a href="index.html">← Back to main catalogue</a>
    </div>

    <div class="grid">

        <!-- PRODUCT 1 -->
        <div class="item">
            <img src="https://i.postimg.cc/SxTbhrMv/1.jpg">
            <div class="price">Chrome Hearts Datass - $140</div>
            <div class="availability">SOLD OUT</div>
        </div>

        <!-- PRODUCT 2 -->
        <div class="item">
            <img src="https://i.postimg.cc/1zVwSytJ/1.jpg">
            <div class="price">Sato La VEGA - $170</div>
            <div class="availability">AVAILABLE</div>
        </div>

        <!-- PRODUCT 3 -->
        <div class="item">
            <img src="https://i.postimg.cc/brVwd2VP/1.jpg">
            <div class="price">BOTTEGA VENETTA BV1336OA - $115</div>
            <div class="availability">AVAILABLE</div>
        </div>

        <!-- PRODUCT 4 -->
        <div class="item">
            <img src="https://i.postimg.cc/rpRwhJyK/1.avif">
            <div class="price">BALENCIAGA 2.0 NAVIGATOR SUNGLASSES - $110</div>
            <div class="availability">AVAILABLE</div>
        </div>

    </div>

    <!-- ✅ AUTO COLOR SCRIPT -->
    <script>
    document.querySelectorAll('.availability').forEach(el => {
        if (el.textContent.trim().toUpperCase() === "SOLD OUT") {
            el.style.color = "#0c3265";
        }
    });
    </script>

</body>
</html>
