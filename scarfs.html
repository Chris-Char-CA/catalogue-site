<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Scarfs</title>

    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #650c32;
            margin: 0;
            color: white;
        }

        /* HEADER */
        .header {
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .header img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        h1 { 
            text-align: center; 
            padding: 25px 0 15px;
            color: white;
            font-size: 42px;
            margin: 0;
        }

        .back-link {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
        }

        /* 2 PRODUCTS PER ROW */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 35px;
            padding: 20px 30px 40px;
        }

        .item {
            text-align: center;
        }

        /* REDUCED PRODUCT IMAGES (-15%) */
        .item img {
            width: 85%;
            height: 290px;
            object-fit: cover;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        .item:hover img {
            transform: scale(1.03);
        }

        /* PRICE */
        .price {
            font-size: 22px;
            font-weight: bold;
            color: white;
            margin-top: 12px;
        }

        /* AVAILABLE / SOLD OUT */
        .availability {
            font-size: 18px;
            font-weight: bold;
            color: #fed57e;
            margin-top: 6px;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .item img {
                width: 90%;
                height: 260px;
            }
        }
    </style>
</head>

<body>

    <!-- FULL WIDTH HEADER -->
    <div class="header">
        <img src="https://i.postimg.cc/sD1pmPzC/IMG-6054.png" alt="Header Banner">
    </div>

    <h1>Scarfs</h1>

    <div class="back-link">
        <a href="index.html">← Back to main catalogue</a>
    </div>

    <div class="grid">

        <!-- PRODUCT 1 -->
        <div class="item">
            <a href="product-pages/scarf_01.html">
                <img src="https://i.postimg.cc/52f353vw/20260102-213817396-i-OS.jpg" alt="Loewe">
            </a>

            <div class="price">
                Loewe wool 100% - $120
            </div>

            <div class="availability">
                Available
            </div>
        </div>

        <!-- PRODUCT 2 -->
        <div class="item">
            <a href="product-pages/scarf_02.html">
                <img src="https://i.postimg.cc/7P7dmKCn/20260102-213828846-i-OS.jpg" alt="FENDI double-sided cashmere scarf">
            </a>

            <div class="price">
                FENDI double-sided cashmere scarf - $140
            </div>

            <div class="availability">
                Available
            </div>
        </div>

        <!-- PRODUCT 3 -->
        <div class="item">
            <a href="product-pages/sunglasses_03.html">
                <img src="https://i.postimg.cc/c1BMxzrZ/1.jpg" alt="FENDI">
            </a>

            <div class="price">
                FENDI - $110
            </div>

            <div class="availability">
                Available
            </div>
        </div>

        <!-- PRODUCT 4 -->
        <div class="item">
            <a href="product-pages/scarf_04.html">
                <img src="https://i.postimg.cc/SKtTSvRh/1.jpg" alt="CELINE">
            </a>

            <div class="price">
                CELINE SCARF - $100
            </div>

            <div class="availability">
                Available
            </div>
        </div>

        <!-- PRODUCT 5 -->
        <div class="item">
            <a href="product-pages/scarf_05.html">
                <img src="https://i.postimg.cc/K8Tvr6X1/1.jpg" alt="BURBERRY">
            </a>

            <div class="price">
                BURBERRY - $115
            </div>

            <div class="availability">
                Available
            </div>
        </div>

    </div>

</body>
</html>
